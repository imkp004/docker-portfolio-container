name: My-first-pipeline

on:
    push:
        branches:
            - main

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Clone the code
              uses: actions/checkout@v4
            - name: Build image
              run: |
                docker build -t 609554/cicd-portfolio .
            - name: Docker Login
              uses: docker/login-action@v3
              with:
                username: 609554
                password: ${{ secrets.DCOEKR_PASS }}
            - name: Push image
              run: 
                docker push 609554/cicd-portfolio
              